<!DOCTYPE html>
<html>
<head>
    <title>Statistics</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            margin: 40px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 800px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background-color: #007bff;
            color: white;
            padding: 10px;
        }

        td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Top 10 Countries by Number of Universities</h1>
        <a href="/">Back to Home</a>

        <table>
            <tr>
                <th>Rank</th>
                <th>Country</th>
                <th>Total Universities</th>
            </tr>

            {% for row in data %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ row["country"] }}</td>
                <td>{{ row["total"] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
