<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}University Rankings{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="/" class="site-logo">&#127979; UniRankings</a>
            <nav class="site-nav">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a>
                <a href="/stats" class="nav-link {% if request.path == '/stats' %}active{% endif %}">Statistics</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>CS551P &mdash; Top University Rankings &mdash; Data from CWUR Open Dataset</p>
        </div>
    </footer>
</body>
</html>
