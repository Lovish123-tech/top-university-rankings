<!DOCTYPE html>
<html>
<head>
    <title>{{ name }} Details</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            margin: 40px;
        }

        h1 {
            color: #333;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 600px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background-color: #007bff;
            color: white;
            padding: 10px;
        }

        td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .back-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 15px;
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .back-btn:hover {
            background-color: #5a6268;
        }
    </style>

</head>
<body>

<div class="container">
    <h1>{{ name }} - Details</h1>

    <a href="/" class="back-btn">⬅ Back</a>

    <table>
        <tr>
            <th>Year</th>
            <th>Rank</th>
            <th>Score</th>
            <th>Country</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row['year'] }}</td>
            <td>{{ row['rank'] }}</td>
            <td>{{ row['score'] }}</td>
            <td>{{ row['country'] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
